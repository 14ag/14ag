name: Deploy Supabase

on:
  push:
    branches:
      - supabase
    paths:
      - "**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_WORKDIR: .

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Resolve Supabase project ref
        run: |
          project_ref="${SUPABASE_URL#https://}"
          project_ref="${project_ref%%.supabase.co*}"

          if ! [[ "$project_ref" =~ ^[a-z0-9]{20}$ ]]; then
            echo "SUPABASE_URL must look like https://<project-ref>.supabase.co"
            exit 1
          fi

          echo "SUPABASE_PROJECT_REF=$project_ref" >> "$GITHUB_ENV"

      - name: Prepare Supabase CLI layout
        run: |
          mkdir -p supabase/functions
          cp config.toml supabase/config.toml
          cp -R functions/manage-projects supabase/functions/manage-projects

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy manage-projects function
        run: supabase functions deploy manage-projects --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
